<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شهر می‌کاری</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="forest-bg"></div>

<header class="top-bar">

<div class="score-card">
⭐ <span id="starsCount">0</span>
</div>

<div class="progress-wrap">
<div id="progressBar"></div>
</div>

<div class="level-card">
مرحله
<span id="levelNumber">1</span>
</div>

</header>

<div class="game-panel">

<h1 class="game-title">
🌳  شهر می ،‌کاری (می کاری)
</h1>

<h2 id="question">
در حال بارگذاری...
</h2>

<img
id="levelImage"
src=""
alt="تصویر مرحله">

<div id="options"></div>

<div
id="resultBox"
style="display:none">

<div id="resultText"></div>

</div>

<div class="btn-area">

<button
id="nextBtn"
onclick="nextLevel()"
style="display:none">

مرحله بعد

</button>

<button
id="retryBtn"
onclick="retryLevel()"
style="display:none">

تلاش دوباره

</button>

</div>

</div>

<div class="rabbit-box">

<div id="rabbitText">
سلام دوست من 🌟
</div>



</div>

<footer class="bottom-menu">

<div>🏠 خانه</div>
<div>🗺️ نقشه</div>
<div>🏆 مدال</div>
<div>🛒 فروشگاه</div>

</footer>

<footer class="designer">

طراح: آقای ابوالفضل باقری
📞 09045439802

</footer>

<audio id="bgMusic" loop>
<source src="sounds/bg-music.mp3">
</audio>

<script src="js/levels.js"></script>
<script src="js/game.js"></script>

</body>

</html>
